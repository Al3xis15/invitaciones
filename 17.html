<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación</title>

    <style>
		
        body {
            margin: 0;
            padding: 0;
            font-family: 'TangerineBold', serif;
            color: black;
            background-color: #f8f9fa;
        }

        @font-face {
            font-family: 'TangerineBold';
            src: url('recursos/Tangerine-Bold.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* Secciones principales */
        .hero {
            min-height: 100vh;
            background: url("recursos/17.jpg") center/cover no-repeat fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .segunda-seccion {
            background: white;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .tercera-seccion {
    /* Si falta fondo abajo en pantallas largas de celular, el fondo #1a002c (morado oscuro) rellenará de forma invisible */
    background: url("recursos/frida.png") center/cover no-repeat;
    padding: 60px 20px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    box-sizing: border-box;
}

.cuarta-seccion {
    /* Usamos un fondo base oscuro para amarrar con el itinerario y evitar el blanco */
    background: url("recursos/4itinerario.png") center/top no-repeat;
    background-size: cover;
    padding: 40px 20px;
    box-sizing: border-box;
}

/* Media query específica para corregir el estiramiento del fondo en móviles */
@media (max-width: 768px) {
    .tercera-seccion {
        background-size: 100% 100%; /* Fuerza a la imagen a cubrir verticalmente sin dejar aire */
        padding: 45px 15px;
    }
    
    .cuarta-seccion {
        background-size: 100% 100%; /* Evita que el itinerario deje bandas blancas abajo */
        padding: 35px 15px;
    }
}

/* Contenedor principal del texto */
.encabezado-seccion {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
}

/* Alinea el h1 y el SVG en la misma línea */
.titulo-con-icono {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px; /* Espacio entre el texto y el icono de al lado */
}

/* Título "Mis 18 años" con más presencia en móvil */
.titulo-festejo {
    font-size: clamp(2.8rem, 9vw, 4rem); /* Aumentamos el tamaño inicial de 2rem a 2.8rem */
    color: white;
    text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
    margin: 0;
    font-weight: bold;
    line-height: 1.1;
    text-align: center;
}

/* Icono al lado del texto más grande */
.svg-al-lado {
    width: clamp(35px, 8vw, 45px); /* Subió el mínimo a 35px */
    height: auto;
    filter: drop-shadow(0px 2px 5px rgba(0,0,0,0.5));
}

/* Icono de abajo más grande */
.svg-abajo {
    width: 55px; /* Subió de 40px a 55px */
    height: auto;
    filter: drop-shadow(0px 2px 5px rgba(0,0,0,0.5));
}

/* Descripción de la sección 3 (Mucho más grande y legible en celular) */
.descripcion {
    max-width: 500px;
    margin: 40px auto;
    text-align: center;
    font-size: clamp(2.3rem, 7.5vw, 3.5rem); /* Subió el mínimo para que se lea enorme */
    line-height: 1.2;
    color: #ffffff;
    text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.7);
}




/* Contenedor del SVG de abajo */
.icono-abajo {
    margin-top: 8px; /* Separación respecto al título */
    display: flex;
    justify-content: center;
}




/* Asegura el centrado absoluto vertical y horizontal con toda la pantalla disponible */
.hero {
    min-height: 100vh;
    background: url("recursos/17.jpg") center/cover no-repeat fixed; 
    display: flex;
    justify-content: center;  /* Centrado horizontal */
    align-items: center;      /* Centrado vertical */
    padding: 30px 20px;       /* Margen de seguridad para el fondo */
    box-sizing: border-box;
}

/* Contenedor compacto que agrupa el título y la mini tarjeta */
.contenedor-hero-vertical {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    gap: 12px;
}

/* 1. REDUCCIÓN DE ANCHO: Tarjeta ultra compacta */
.tarjeta-pequena {
    background: #ffffff;
    width: 70%;               /* Bajamos del 85% al 70% para que use menos ancho */
    max-width: 250px;         /* Límite estricto muy pequeño y estilizado */
    border-radius: 18px;
    overflow: hidden;
    box-shadow: 0 12px 35px rgba(0, 0, 0, .4);
    padding: 8px 8px 4px 8px; /* Márgenes blancos internos mínimos */
    box-sizing: border-box;
    margin: 0;
}

/* 2. REDUCCIÓN DE ALTO: Imagen muy baja (chaparrita) */
.foto img {
    display: block;
    width: 100%;
    height: 140px;            /* Forzamos una altura fija pequeña */
    object-fit: cover;        /* Recorta la imagen limpiamente sin deformarla */
    border-radius: 10px;
}

/* 3. CALENDARIO MINIATURA: Menos espacio vertical */
.calendario-interno {
    text-align: center;
    padding: 8px 0 2px 0;    /* Espaciados mínimos */
}

.mes {
    font-size: clamp(1.2rem, 4vw, 1.5rem); /* Texto pequeño y fino */
    color: #333333;
    margin: 0 0 2px 0;
    letter-spacing: 2px;
    font-weight: bold;
}

.svg-calendario {
    width: 80%;
    max-width: 130px;         /* El mapa del calendario ahora es una miniatura */
    height: auto;
    display: inline-block;
}



        /* Caja de Cuenta Regresiva */
        .countdown {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, .95);
            padding: 25px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .15);
            box-sizing: border-box;
        }

        .countdown h2 {
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            color: #222;
            margin: 0 0 10px 0;
        }

        #contador {
            font-size: clamp(2.2rem, 7vw, 3.8rem);
            font-weight: bold;
            color: white;
            letter-spacing: 1px;
        }

        /* Elementos informativos generales */
        .info-item {
            width: 100%;
            max-width: 500px;
            margin: 0 auto 30px auto;
            text-align: center;
        }

        .foto-lugar {
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            display: block;
            margin: 0 auto 20px auto;
            box-shadow: 0 8px 25px rgba(0, 0, 0, .25);
        }

        /* Enlaces y Botones (Acciones Grandes) */
        .link-mapa {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 32px;
            border-radius: 50px;
            text-decoration: none;
            color: #fff;
             background: #C73850;
            font-weight: bold;
            font-size: clamp(1.8rem, 4vw, 2.3rem);
            transition: transform .2s ease;
            box-shadow: 0 4px 15px rgba(44, 123, 229, 0.4);
        }

   

        .btn-confirmar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            color: #fff;
            background: #C73850;
            padding: 18px 36px;
            border-radius: 60px;
            font-size: clamp(1.4rem, 4vw, 1.9rem);
            font-weight: bold;
            margin: 20px auto;
            transition: transform .2s ease;
            box-shadow: 0 5px 20px rgba(37, 211, 102, 0.4);
        }

        .link-mapa:hover,
        .btn-confirmar:hover {
            transform: scale(1.04);
        }

        .icono-maps,
        .icono-wa {
            width: clamp(30px, 6vw, 42px);
            height: auto;
        }

        /* Pantallas móviles chicas */
        @media(max-width: 480px) {
            .hero {
                padding: 10px;
            }
            .tarjeta {
                border-radius: 16px;
            }
            .link-mapa, .btn-confirmar {
                width: 90%;
                box-sizing: border-box;
            }
        }
    </style>
</head>

<body>

   <section class="hero">
    <div class="contenedor-hero-vertical">
        
     <div class="encabezado-seccion">
    
    <div class="titulo-con-icono">
        <h1 class="titulo-festejo">Mis 18 años</h1>
        <img src="recursos/balloon.svg" class="svg-al-lado" alt="Icono Fiesta">
    </div>
    
    <div class="icono-abajo">
        <img src="recursos/cake.svg" class="svg-abajo" alt="Decoración">
    </div>

</div>

        <div class="tarjeta-pequena">
            
            <div class="foto">
                <img src="recursos/17.jpg" alt="Invitación">
            </div>
            
            <div class="calendario-interno">
                <h2 class="mes">25/JULIO</h2>
                <img src="recursos/calendario.svg" class="svg-calendario" alt="Calendario">
            </div>

        </div>
      <div id="contador"></div>
    </div>
	
</section>


    <section class="tercera-seccion">
        <div class="info-item">
            <img src="recursos/frida.png" alt="Lugar del evento" class="foto-lugar">
            <a href="https://maps.app.goo.gl/Kx8Z775cM1YuycBL9" target="_blank" class="link-mapa">
                <img src="recursos/maps.svg" alt="Mapa" class="icono-maps">
                <span>Av. Par Vial 45-A, Atlacomulco, 62560 Jiutepec, Mor.</span>
            </a>
        </div>

        <p class="descripcion">
            Me encantaría que me acompañes en este día tan especial.
        </p>

        <a href="https://wa.me/5216633191218?text=Hola,%20confirmo%20mi%20asistencia%20al%20evento%20(:" target="_blank" class="btn-confirmar">
            <img src="recursos/wa.svg" alt="WhatsApp" class="icono-wa">
            <span>Confirmar asistencia</span>
        </a>
    </section>

    <section class="cuarta-seccion">
        </section>

    <audio id="musica" loop>
        <source src="recursos/marryMusic.mp3" type="audio/mpeg">
    </audio>

    <script>
        const destino = new Date("July 30, 2026 18:00:00").getTime();

        function actualizar() {
            const ahora = new Date().getTime();
            const diferencia = destino - ahora;

            if (diferencia <= 0) {
                document.getElementById("contador").innerHTML = "¡Ha llegado el gran día!";
                clearInterval(intervalo);
                return;
            }

            const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);

            document.getElementById("contador").innerHTML =
                `${dias}d ${horas}h ${minutos}m ${segundos}s`;
        }

        actualizar();
        const intervalo = setInterval(actualizar, 1000);
    </script>

</body>
</html>
