<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Invitación</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background-image:url("recursos/17.jpg");
    background-size: cover;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    padding:25px;

    font-family:Arial, Helvetica, sans-serif;
}

/* Tarjeta */

.tarjeta{

    background:#fff;

    width:min(95%,550px);

    border-radius:20px;

    padding:20px;

    box-shadow:0 15px 35px rgba(0,0,0,.25);

}

/* Imagen */

.foto{
    display:flex;
    justify-content:center;
}

.foto img{
    width:85%;
    max-width:420px;
    height:auto;
    display:block;
}

/* Espacio para calendario */

.calendario{

    margin-top:25px;

    text-align:center;

}

.mes{

    font-size:clamp(2rem,5vw,3rem);

    color:#444;

    margin-bottom:15px;

    letter-spacing:3px;

}

.svg-calendario{

    width:min(100%,420px);

    height:auto;

}

/* Cuenta regresiva */

.countdown{

    margin-top:30px;

    background:rgba(255,255,255,.9);

    padding:18px 28px;

    border-radius:18px;

    text-align:center;

    box-shadow:0 8px 25px rgba(0,0,0,.2);

}

.countdown h2{

    font-size:clamp(1.5rem,5vw,2.4rem);

    color:#222;

    margin-bottom:10px;

}

#contador{

    font-size:clamp(2rem,8vw,3.5rem);

    font-weight:bold;

    color:#d6336c;

}

/* Celulares */

@media(max-width:600px){

    .tarjeta{
        padding:15px;
    }

    .calendario{
        height:140px;
        font-size:1.1rem;
    }

}
</style>

</head>

<body>

<div class="tarjeta">

    <div class="foto">
        <img src="recursos/17.jpg" alt="Invitación">
    </div>

    <div class="calendario">

    <h2 class="mes">JULIO</h2>

    <img src="recursos/calendario.svg"
         class="svg-calendario"
         alt="Calendario">

</div>
</div>

<div class="countdown">

    <h2>Faltan</h2>

    <div id="contador"></div>

</div>

<script>

const destino = new Date("July 30, 2026 18:00:00").getTime();

function actualizar(){

    const ahora = new Date().getTime();

    const diferencia = destino - ahora;

    if(diferencia <= 0){

        document.getElementById("contador").innerHTML="¡Ha llegado el gran día!";
        clearInterval(intervalo);
        return;

    }

    const dias = Math.floor(diferencia/(1000*60*60*24));

    const horas = Math.floor((diferencia%(1000*60*60*24))/(1000*60*60));

    const minutos = Math.floor((diferencia%(1000*60*60))/(1000*60));

    const segundos = Math.floor((diferencia%(1000*60))/1000);

    document.getElementById("contador").innerHTML =
        `${dias}d ${horas}h ${minutos}m ${segundos}s`;

}

actualizar();

const intervalo = setInterval(actualizar,1000);

</script>

</body>

</html>
