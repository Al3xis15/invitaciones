<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitación</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'TangerineBold', serif;
            color: black;
            background-color: #f8f9fa;
        }

        @font-face {
            font-family: 'TangerineBold';
            src: url('recursos/Tangerine-Bold.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* Secciones principales */
        .hero {
            min-height: 100vh;
            background: url("recursos/17.jpg") center/cover no-repeat fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .segunda-seccion {
            background: white;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .tercera-seccion {
            background: url("recursos/frida.png") center/cover no-repeat;
            padding: 60px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

       .cuarta-seccion{
    min-height: 100vh;
    background: url("recursos/4itinerario.png") center center/contain no-repeat;
    background-color: #ffffff;
}

        /* Estructura de la Tarjeta */
        .tarjeta {
            background: #ffffff;
            width: 100%;
            max-width: 480px;
            border-radius: 24px;
            padding: 0;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, .3);
        }

        /* Contenedor de la foto de portada */
        .foto {
            width: 100%;
            overflow: hidden;
        }

        .foto img {
            display: block;
            width: 100%;
            height: auto;
            max-height: 450px;
            object-fit: cover;
        }

        /* Bloque inferior blanco para el calendario */
        .calendario {
            padding: 30px 20px;
            text-align: center;
            background: #ffffff;
        }

        .mes {
            font-size: clamp(2.2rem, 6vw, 3.5rem);
            color: #333;
            margin: 0 0 15px 0;
            letter-spacing: 4px;
            font-weight: bold;
        }

        .svg-calendario {
            width: 100%;
            max-width: 320px;
            height: auto;
            display: inline-block;
        }

        /* Caja de Cuenta Regresiva */
        .countdown {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, .95);
            padding: 25px 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .15);
            box-sizing: border-box;
        }

        .countdown h2 {
            font-size: clamp(1.8rem, 5vw, 2.6rem);
            color: #222;
            margin: 0 0 10px 0;
        }

        #contador {
            font-size: clamp(2.2rem, 7vw, 3.8rem);
            font-weight: bold;
            color: #d6336c;
            letter-spacing: 1px;
        }

        /* Elementos informativos generales */
        .info-item {
            width: 100%;
            max-width: 500px;
            margin: 0 auto 30px auto;
            text-align: center;
        }

        .foto-lugar {
            width: 100%;
            max-width: 450px;
            border-radius: 20px;
            display: block;
            margin: 0 auto 20px auto;
            box-shadow: 0 8px 25px rgba(0, 0, 0, .25);
        }

        /* Enlaces y Botones (Acciones Grandes) */
        .link-mapa {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 32px;
            border-radius: 50px;
            text-decoration: none;
            color: #fff;
             background: transparent;
            font-weight: bold;
            font-size: clamp(1.3rem, 4vw, 1.8rem);
            transition: transform .2s ease;
            box-shadow: 0 4px 15px rgba(44, 123, 229, 0.4);
        }

        .descripcion {
            max-width: 500px;
            margin: 40px auto;
            text-align: center;
            font-size: clamp(2rem, 6vw, 3rem);
            line-height: 1.3;
            color: #ffffff;
            text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.6);
        }

        .btn-confirmar {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-decoration: none;
            color: #fff;
            background: #25D366;
            padding: 18px 36px;
            border-radius: 60px;
            font-size: clamp(1.4rem, 4vw, 1.9rem);
            font-weight: bold;
            margin: 20px auto;
            transition: transform .2s ease;
            box-shadow: 0 5px 20px rgba(37, 211, 102, 0.4);
        }

        .link-mapa:hover,
        .btn-confirmar:hover {
            transform: scale(1.04);
        }

        .icono-maps,
        .icono-wa {
            width: clamp(30px, 6vw, 42px);
            height: auto;
        }

        /* Pantallas móviles chicas */
        @media(max-width: 480px) {
            .hero {
                padding: 10px;
            }
            .tarjeta {
                border-radius: 16px;
            }
            .link-mapa, .btn-confirmar {
                width: 90%;
                box-sizing: border-box;
            }
        }
    </style>
</head>

<body>

    <section class="hero">
        <div class="tarjeta">
            <div class="foto">
                <img src="recursos/17.jpg" alt="Invitación">
            </div>
            <div class="calendario">
                <h2 class="mes">JULIO</h2>
                <img src="recursos/calendario.svg" class="svg-calendario" alt="Calendario">
            </div>
        </div>
    </section>

    <section class="segunda-seccion">
        <div class="countdown">
            <h2>Faltan</h2>
            <div id="contador"></div>
        </div>
    </section>

    <section class="tercera-seccion">
        <div class="info-item">
            <img src="recursos/frida.png" alt="Lugar del evento" class="foto-lugar">
            <a href="https://maps.app.goo.gl/54nLaTaRcMG64sTn6" target="_blank" class="link-mapa">
                <img src="recursos/maps.svg" alt="Mapa" class="icono-maps">
                <span>Ver mapa</span>
            </a>
        </div>

        <p class="descripcion">
            Me encantaría que me acompañes en este día tan especial.
        </p>

        <a href="https://wa.me/5216633191218?text=Hola,%20confirmo%20mi%20asistencia%20al%20evento%20(:" target="_blank" class="btn-confirmar">
            <img src="recursos/wa.svg" alt="WhatsApp" class="icono-wa">
            <span>Confirmar asistencia</span>
        </a>
    </section>

    <section class="cuarta-seccion">
        </section>

    <audio id="musica" loop>
        <source src="recursos/marryMusic.mp3" type="audio/mpeg">
    </audio>

    <script>
        const destino = new Date("July 30, 2026 18:00:00").getTime();

        function actualizar() {
            const ahora = new Date().getTime();
            const diferencia = destino - ahora;

            if (diferencia <= 0) {
                document.getElementById("contador").innerHTML = "¡Ha llegado el gran día!";
                clearInterval(intervalo);
                return;
            }

            const dias = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            const horas = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutos = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
            const segundos = Math.floor((diferencia % (1000 * 60)) / 1000);

            document.getElementById("contador").innerHTML =
                `${dias}d ${horas}h ${minutos}m ${segundos}s`;
        }

        actualizar();
        const intervalo = setInterval(actualizar, 1000);
    </script>

</body>
</html>
